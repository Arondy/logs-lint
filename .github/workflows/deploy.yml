name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build binary
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir build
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o build/analyzer ./cmd/analyzer
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o build/analyzer.exe ./cmd/analyzer

      - name: Install golangci-lint
        if: startsWith(github.ref, 'refs/tags/v')
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          install-only: true

      - name: Build custom golangci-lint
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          export PATH=$PATH:/home/runner/golangci-lint-2.12.2-linux-amd64

          golangci-lint custom -v

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            build/analyzer
            build/analyzer.exe
            build/logs-gcl
          generate_release_notes: true
          draft: false
          prerelease: false
